checkDialogLanguageHelp = The language of the paragraph shown in the editor element is displayed.\nIf you want to change the language of the underlined match or the whole paragraph, choose the new language first.\nAfter a new language is selected the \u201cChange Language\u201d button will be activated.
checkDialogChangeLanguageHelp = The list is activated, after a new language was selected.\nClick on the list to choose:\n- change the language of the match (underlined in the editor element)\n- the whole paragraph
checkDialogMatchDescriptionHelp = Gives a description of the possible error found by the spell or grammar checker.
checkDialogMatchParagraphHelp = Display the paragraph in which the match was found. The possible error is underlined and displayed in the defined color (spelling errors: red, grammatical errors: blue, stylistic errors: green, colors can be defined by the user in the LT option dialog).\nThe paragraph can be edited by the user.\nPress the \u201cChange\u201d button after editing to change the text of the document.
checkDialogSuggestionsHelp = The list of suggestions for the match is displayed.\n- Select a suggestion and press the \u201cChange\u201d button to replace the underlined match by the selected suggestion.\nHint: If you had changed the text in the editor element, the changed text will be replaced inside the document instead of the suggestion.
checkDialogCheckTypeHelp = Select to check:\n- only spelling\n- only grammar (and style)\n- all (spelling, grammar and style)
checkDialogHelpButtonHelp = Opens the help dialog
checkDialogOptionsButtonHelp = Opens the LT options dialog.\nThe Options can be changed by the user and saved by clicking the \u201cOK\u201d button of the dialog.
checkDialogUndoButtonHelp = Undoes the last action.\nUp to 20 actions can be undone.
checkDialogCloseButtonHelp = Closes the spell and grammar check dialog.
checkDialogMoreButtonHelp = For grammatical errors only:\nOpens a link in a browser to get advanced information about the error.
checkDialogIgnoreButtonHelp = Ignores the current match\n(The match is ignored until the next change of paragraph).
checkDialogIgnoreAllButtonHelp = Ignores all similar matches in the document:\n- For spelling errors: Ignore all words like the misspelled one\n- For grammatical errors: Ignore the rule\nThe words or rules are ignored till the end of the session.
checkDialogIgnorePermanentButtonHelp = Ignores the current match\nThe match is ignored also after reopening the document\nuntil the reset ignore permanent button is clicked.
checkDialogResetIgnorePermanentButtonHelp = The permanent ignored matches will be reset.
checkDialogDeactivateRuleButtonHelp = For grammatical errors only:\nThe rule is deactivated permanently\n(Can be activated again by LT option dialog).
checkDialogActivateRuleButtonHelp = Reactivate deactivated rules.
checkDialogAddToDictionaryButtonHelp = For spelling errors only:\nChoose a dictionary from the list.\nThe unknown word is added to the chosen dictionary.
checkDialogChangeButtonHelp = Changes the text of the shown paragraph.\nThere are two modes of operation:\n1. If the paragraph shown in the editor element was changed by the user, the original text of the paragraph is replaced with the new text.\n2. If the paragraph shown in the editor element was not changed by the user, but at least one suggestion exist, the underlined match is replaced by the selected suggestion.\nIf there is no suggestion and no change in the editor field, the button is deactivated.
checkDialogChangeAllButtonHelp = For spelling errors only:\nChanges all misspelled words in the document to the selected suggestion.
checkDialogAutoCorrectButtonHelp = Changes all misspelled words in the document to the selected suggestion.\nAdd word-suggestion-pair to autoCorrect.
