checkDialogLanguageHelp = Die Sprache des im Editor-Element angezeigten Absatzes wird angezeigt.\nWenn Sie die Sprache des unterstrichenen Fehlers oder des gesamten Absatzes \u00e4ndern m\u00f6chten, w\u00e4hlen Sie zun\u00e4chst die neue Sprache aus.\nNachdem eine neue Sprache ausgew\u00e4hlt wurde, wird die Schaltfl\u00e4che \u201eSprache \u00e4ndern\u201c aktiviert.
checkDialogChangeLanguageHelp = Die Liste wird aktiviert, nachdem eine neue Sprache ausgew\u00e4hlt wurde. \nKlicken Sie auf die Liste, um zu w\u00e4hlen: \n - die Sprache der \u00dcbereinstimmung zu \u00e4ndern (im Editor-Element unterstrichen) \n - den gesamten Absatz
checkDialogMatchDescriptionHelp = Zeigt eine Beschreibung des von der Pr\u00fcfung gefundenen Fehlers.
checkDialogMatchParagraphHelp = Anzeige des Absatzes, in dem der Fehler gefunden wurde. Der m\u00f6gliche Fehler wird unterstrichen und in der definierten Farbe angezeigt (Rechtschreibfehler: rot, Grammatikfehler: blau, stilistische Fehler: gr\u00fcn, Farben k\u00f6nnen vom Nutzer im LT-Optionsdialog definiert werden).\nDer Absatz kann vom Nutzer bearbeitet werden.\nDr\u00fccken Sie nach der Bearbeitung die Schaltfl\u00e4che \u201e\u00c4ndern\u201c, um den Text des Dokuments zu \u00e4ndern.
checkDialogSuggestionsHelp = Die Liste der Vorschl\u00e4ge f\u00fcr den Fehler wird angezeigt.\n- W\u00e4hlen Sie einen Vorschlag aus und dr\u00fccken Sie die Schaltfl\u00e4che \u201e\u00c4ndern\u201c, um den unterstrichenen Fehler durch den ausgew\u00e4hlten Vorschlag zu ersetzen.\nHinweis: Wenn Sie den Text im Editor-Element ge\u00e4ndert haben, wird der ge\u00e4nderte Text im Dokument anstelle des Vorschlags ersetzt.
checkDialogCheckTypeHelp = Ausw\u00e4hlen, was gepr\u00fcft werden soll:\n- nur Rechtschreibung\n- nur Grammatik (und Stil)\n- alles (Rechtschreibung, Grammatik, Stil)
checkDialogHelpButtonHelp = \u00d6ffnet den Hilfe-Dialog
checkDialogOptionsButtonHelp = \u00d6ffnet die LT-Optionen.\nDie Optionen k\u00f6nnen vom Nutzer ge\u00e4ndert und durch Klicken auf die Schaltfl\u00e4che \u201eOK\u201c des Dialogs gespeichert werden.
checkDialogUndoButtonHelp = Macht die letzte Aktion r\u00fcckg\u00e4ngig.\nBis zu 20 Aktionen k\u00f6nnen r\u00fcckg\u00e4ngig gemacht werden.
checkDialogCloseButtonHelp = Schlie\u00dft den Pr\u00fcfdialog.
checkDialogMoreButtonHelp = Nur f\u00fcr Grammatikfehler:\n \u00d6ffnet den Link im Browser, um mehr Informationen anzuzeigen.
checkDialogIgnoreButtonHelp = Ignoriert den aktuellen Fehler\n\u00a0 (Der Fehler wird bis zum n\u00e4chsten Absatz ignoriert).
checkDialogIgnoreAllButtonHelp = Ignoriert alle \u00e4hnlichen Treffer im Dokument:\n- Bei Rechtschreibfehlern: Alle W\u00f6rter ignorieren, die dem falsch geschriebenen Wort \u00e4hneln\n- Bei Grammatikfehlern: Die Regel ignorieren\nDie W\u00f6rter oder Regeln werden bis zum Ende der Sitzung ignoriert.
checkDialogIgnorePermanentButtonHelp = Ignoriert den aktuellen Treffer\n Der Treffer wird auch nach dem erneuten \u00d6ffnen des Dokuments ignoriert,\n bis die Schaltfl\u00e4che Dauerhaft ignorieren zur\u00fccksetzen angeklickt wird.
checkDialogResetIgnorePermanentButtonHelp = Die dauerhaft ignorierten Treffer werden zur\u00fcckgesetzt.
checkDialogDeactivateRuleButtonHelp = Nur f\u00fcr Grammatikfehler:\n\u00a0 Die Regel wird dauerhaft deaktiviert\n\u00a0 (Kann \u00fcber den LT-Optionsdialog wieder aktiviert werden).
checkDialogActivateRuleButtonHelp = Deaktivierte Regeln wieder aktivieren
checkDialogAddToDictionaryButtonHelp = Nur f\u00fcr Rechtschreibfehler:\n W\u00e4hlen Sie ein W\u00f6rterbuch aus der Liste.\n Das unbekannte Wort wird dem gew\u00e4hlten W\u00f6rterbuch hinzugef\u00fcgt.
checkDialogChangeButtonHelp = \u00c4ndert den Text des angezeigten Absatzes. \nEs gibt zwei Betriebsmodi: \n1. Wenn der im Editor-Element angezeigte Absatz vom Nutzer ge\u00e4ndert wurde, wird der urspr\u00fcngliche Text des Absatzes durch den neuen Text ersetzt. \n2. Wenn der im Editor-Element angezeigte Absatz nicht vom Nutzer ge\u00e4ndert wurde, aber mindestens ein Vorschlag vorhanden ist, wird der unterstrichene Fehler durch den ausgew\u00e4hlten Vorschlag ersetzt. \nGibt es keinen Vorschlag und keine \u00c4nderung im Editor-Element, ist die Schaltfl\u00e4che deaktiviert.
checkDialogChangeAllButtonHelp = Nur f\u00fcr Rechtschreibfehler:\n \u00c4ndert alle falsch geschriebenen W\u00f6rter im Dokument in den ausgew\u00e4hlten Vorschlag.
checkDialogAutoCorrectButtonHelp = \u00c4ndert alle falsch geschriebenen W\u00f6rter zur gew\u00e4hlten Korrektur.\nWort/Vorschlag-Paar zur Autokorrektur hinzuf\u00fcgen.
checkDialogHelpText = Der Dialog zur Rechtschreib- und Grammatikpr\u00fcfung verwendet die LibreOffice/OpenOffice-Rechtschreibpr\u00fcfung und die Grammatik- und Stilpr\u00fcfung von LanguageTool.\nUm Hilfe zu einzelnen Elementen des Dialogs zu erhalten, bewegen Sie den Mauszeiger \u00fcber das betreffende Element.
