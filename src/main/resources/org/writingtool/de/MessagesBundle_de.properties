messageDialogSwitchOffMessage = Hintergrundprüfungen sind deaktiviert. Aktivieren Sie sie, um diese Funktion zu nutzen.
messageDialogNoGrammarCheckWarning = Es scheint, dass die automatische Grammatikpr\u00fcfung deaktiviert ist. Bitte aktivieren Sie \u201eGrammatik w\u00e4hrend der Eingabe pr\u00fcfen\u201c unter \u201eExtras / Optionen / Spracheinstellungen / Linguistik\u201c und starten Sie LibreOffice/OpenOffice neu.
messageDialogSpellCheckerWarning = Heap-Speicherplatz zu klein: Die LanguageTool-Rechtschreibpr\u00fcfung wird nicht verwendet.\nSetzen Sie den Heap-Speicherplatz auf mindestens 1024 MB, um die LanguageTool-Rechtschreibpr\u00fcfung zu verwenden.
messageDialogLanguageNotSupported = Fehler: Die Dokumentsprache \u201e{0}\u201c wird von WritingTool nicht unterst\u00fctzt.
messageDialogEnableLoDefaultSettings = Die Einstellungen von LibreOffice und WritingTool stimmten nicht überein.\nDie LibreOffice-Einstellungen wurden auf die Standardeinstellungen von WritingTool geändert.\n\nBitte benutzen Sie künftig die WritingTool-Einstellungen,\nsollten Sie keine Grammatikprüfung im Hintergrund oder keine WritingTool Rechtschreibprüfung wünschen.\n\nLibreOffice muss nun neu gestartet werden.
messageDialogWtIsDisabled = WritingTool ist in den LibreOffice-Einstellungen nicht aktiviert.\n\nBitte aktivieren Sie WritingTool unter: Extras/Optionen/Sprachen und Gebietsschemata/Linguistik\nStellen Sie sicher, dass keine andere Grammatikprüfung installiert ist.\nFalls Sie Hilfe benötigen, suchen Sie die die Seite https:\\writingtool.org auf.\n\nNach den Änderungen in den Einstellungen wird empfohlen, LibreOffice neu zu starten.
messageDialogSpellCheckIsDisabled = Die LibreOffice-Rechtschreibprüfung ist für die Sprache des Dokuments nicht installiert.\nEine Rechtschreib- und Grammatikprüfung kann nur durchgeführt werden, wenn auch eine Rechtschreibprüfung installiert ist.\n\nWahrscheinlich ist für die benutzte Sprache kein Rechtschreibmodul installiert.\nBitte installieren Sie dieses.\n\nSprachkürzel:
