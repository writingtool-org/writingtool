messageDialogEnableLoDefaultSettings = Les configuracions del LibreOffice i del WritingTool no coincideixe.\nS'ha definit la configuració del LibreOffice a la configuració per defecte del WritingTool.\n\nUseu la configuració del WritingTool en el futur\nsi no voleu la revisió gramatical en segon pla ni la revisió ortogràfica del WritingTool.\n\nCal reiniciar el LibreOffice.
